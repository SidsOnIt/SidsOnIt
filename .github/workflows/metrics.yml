name: Metrics
on:
  # Schedule updates once a day at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing the generated image
    steps:
      - name: Top Languages Metric
        uses: lowlighter/metrics@latest
        with:
          # Use your Classic PAT with 'repo' scope
          # Ensure this token is authorized for your organization
          token: ${{ secrets.RW }}
          
          # Options
          user: ${{ github.repository_owner }}
          template: classic
          base: "" # Hides standard profile info
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes # Essential for scanning private repo code
          
          # Force display of all identified languages
          plugin_languages_limit: 0
          plugin_languages_threshold: 0%
          
          debug: no
