name: Metrics
on:
  # Schedule updates once a day at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing the generated image
    steps:
      - name: Top Languages Metric
        uses: lowlighter/metrics@latest
        with:
          # Use your secret named "RW"
          token: ${{ secrets.RW }}
          
          # Options
          user: ${{ github.repository_owner }}
          template: classic
          base: "" # Hides standard profile info
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes # This is key for counting your private code
          debug: no data
