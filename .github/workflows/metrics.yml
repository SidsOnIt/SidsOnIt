name: Metrics
on:
  # Schedule updates once a day at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run it manually from the Actions tab
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Top Languages Metric
        uses: lowlighter/metrics@latest
        with:
          # Automatically uses the built-in repository token
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options
          user: ${{ github.repository_owner }}
          template: classic
          base: "" # Hides standard profile info
          plugin_languages: yes
          plugin_languages_ignored: html, css # Hides markup layout files
          plugin_languages_details: bytes-size, percentage # Shows exact data
